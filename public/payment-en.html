<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABB Bank - Secure Payment Portal</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #ffffff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            z-index: 1000;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header-left img {
            height: 38px;
            object-fit: contain;
        }
        .lang-btn {
            font-weight: bold;
            color: #000000;
            background: #f1f3f5;
            padding: 5px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #000000;
            font-weight: 600;
            font-size: 15px;
        }
        .phone-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .menu-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 22px;
            height: 16px;
            cursor: pointer;
        }
        .menu-icon span {
            display: block;
            height: 2.5px;
            background-color: #000000;
            border-radius: 2px;
        }

        /* Main Wrapper */
        .main-container {
            margin-top: 85px;
            padding: 40px 20px 80px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 85px);
            background-color: #f8f9fa;
        }

        /* Checkout Card */
        .checkout-card {
            width: 100%;
            max-width: 520px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            overflow: hidden;
            border: 1px solid #eaeaea;
        }

        /* Blue Header Background */
        .checkout-header {
            background: linear-gradient(135deg, #0056b3 0%, #004085 100%);
            color: #ffffff;
            padding: 25px 30px;
            text-align: center;
        }
        .checkout-header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
            font-weight: 500;
        }

        .checkout-body {
            padding: 30px;
        }

        /* Blue Alert Boxes */
        .alert-box {
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 13.5px;
            line-height: 1.5;
            margin-bottom: 15px;
            font-weight: 500;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            background-color: #ebf5ff;
            color: #0c4a6e;
            border: 1px solid #bae6fd;
            border-left: 4px solid #0284c7;
        }

        /* Supported Card Logos */
        .payment-methods {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 12px 18px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #eaeaea;
        }
        .pm-label {
            font-size: 13px;
            color: #666;
            font-weight: 600;
        }
        .pm-logos {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .pm-logos img {
            height: 26px;
            object-fit: contain;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 14px;
        }
        .input-wrapper {
            position: relative;
        }
        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #dcdfe6;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            background-color: #fafbfc;
            color: #333;
        }
        .form-control:focus {
            border-color: #0056b3;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0,86,179,0.08);
        }
        
        /* Validation Styles */
        .form-control.valid {
            border-color: #28a745;
            background-color: #f8fff9;
        }
        .form-control.invalid {
            border-color: #dc3545;
            background-color: #fff8f8;
        }
        .validation-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            display: none;
        }
        .card-type-icon {
            position: absolute;
            right: 45px;
            top: 50%;
            transform: translateY(-50%);
            height: 24px;
            display: none;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Blue Submit Button */
        .pay-btn {
            background-color: #0056b3;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0,86,179,0.2);
            margin-top: 10px;
        }
        .pay-btn:hover {
            background-color: #004085;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(0,86,179,0.3);
        }

        /* Footer Section */
        footer {
            background-color: #000000;
            color: #ffffff;
            padding: 60px 20px 30px 20px;
        }
        .footer-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .footer-logo {
            height: 40px;
            object-fit: contain;
            margin-bottom: 25px;
            filter: none;
        }
        .footer-info {
            font-size: 15px;
            line-height: 2.2;
            color: #cccccc;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .footer-bottom {
            margin-top: 40px;
            width: 100%;
            border-top: 1px solid #222222;
            padding-top: 20px;
            font-size: 14px;
            color: #777777;
            text-align: center;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shake { 0%,100%{transform:translateX(0)} 10%,30%,50%,70%,90%{transform:translateX(-5px)} 20%,40%,60%,80%{transform:translateX(5px)} }
        @media (max-width: 580px) {
            .checkout-card { border-radius: 0; box-shadow: none; border: none; }
            .main-container { padding: 0; margin-top: 75px; }
            .checkout-body { padding: 20px; }
        }
    </style>
</head>
