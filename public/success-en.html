<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABB Bank - Success</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #212529;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Success Card Container */
        .success-card {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid #eaeaea;
            padding: 50px 30px;
            text-align: center;
            margin: 20px;
        }

        /* Blue Checkmark Box */
        .success-icon-box {
            width: 90px;
            height: 90px;
            background-color: #f0f7ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            border: 2px solid #e1effe;
        }

        .success-icon-box svg {
            width: 45px;
            height: 45px;
            stroke: #0056b3;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .success-title {
            font-size: 24px;
            color: #004085;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .success-desc {
            font-size: 15.5px;
            color: #555555;
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="success-icon-box">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <h2 class="success-title">Your request has been successfully sent</h2>
        <p class="success-desc">One of our customer service representatives will contact you as soon as possible.</p>
    </div>

</body>
</html>
