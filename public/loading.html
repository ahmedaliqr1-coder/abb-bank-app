<!DOCTYPE html>
<html lang="az" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABB Bank - Yüklənir...</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0056b3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .loading-container {
            text-align: center;
            padding: 40px;
        }

        .spinner-wrapper {
            margin: 0 auto 25px auto;
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-title {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .loading-text {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="loading-container">
        <div class="spinner-wrapper">
            <div class="spinner"></div>
        </div>
        <div class="loading-title">Sifariş təsdiq edilir...</div>
        <p class="loading-text">Zəhmət olmasa gözləyin, ödənişiniz emal olunur.</p>
    </div>

</body>
</html>
